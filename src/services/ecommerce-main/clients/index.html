<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"
      integrity="sha512-8pbzenDolL1l5OPSsoURCx9TEdMFTaeFipASVrMYKhuYtly+k3tcsQYliOEKTmuB1t7yuzAiVo+yd7SJz+ijFQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body>
    <script>
      const keyToken = "XXXyyy";

      const generateRandomNonce = (num) =>
        Math.floor(
          (Math.random() + Math.floor(Math.random() * 9 + 1)) *
            Math.pow(10, num - 1),
        );

      const generateSign = (params) => {
        const sortKeys = [];
        let paramsHolder = "";
        const stime = Date.now();
        const nonce = generateRandomNonce(20);

        params.stime = stime;
        params.nonce = nonce;
        params.keyToken = keyToken;
        params.v = "v1";

        for (let key in params) {
          if (key !== "sign") {
            sortKeys.push(key);
          }
        }

        sortKeys.sort();
        sortKeys.forEach((sortKey) => {
          paramsHolder += `${sortKey}${params[sortKey]}`;
        });

        params.sign = md5(paramsHolder).toString();

        return "?" + new URLSearchParams(params).toString();
      };

      const getData = async () => {
        console.log(
          await (
            await fetch(
              `http://localhost:3056/v1/api/test-replay-attack${generateSign({
                club: "chelsea",
              })}`,
            )
          ).json(),
        );
      };

      getData();
    </script>
  </body>
</html>
